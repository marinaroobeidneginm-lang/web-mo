services:
  db:
    image: postgres:16-alpine
    container_name: marinaro-obeid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: marinaro
      POSTGRES_PASSWORD: marinaro
      POSTGRES_DB: marinaro_obeid
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
